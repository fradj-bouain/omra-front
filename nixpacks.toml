# Nixpacks config for Railway (Node 20 to satisfy Angular CLI >=20.19 / 22.12+)
# Node version: .nvmrc + engines.node = "20" (avoids Node 22.11 which Angular rejects)

[phases.install]
cmds = ["npm install"]

[phases.build]
# More heap for Angular/Vite build (avoids OOM exit code 3 in CI)
cmds = ["export NODE_OPTIONS='--max-old-space-size=4096' && npm run build"]

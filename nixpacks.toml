# Nixpacks config for Railway (Angular CLI requires Node v20.19+ or v22.12+)
# Pin nixpkgs so we get Node 22.13.x (default archive had 22.11 / 20.18 which Angular rejects)
#
# Unset NPM_CONFIG_PRODUCTION avant npm (Railway l’injecte ; la clé « production » est dépréciée dans npm 10+).

[phases.setup]
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"

[phases.install]
cmds = ["unset NPM_CONFIG_PRODUCTION; npm ci --include=dev"]

[phases.build]
cmds = [
  "unset NPM_CONFIG_PRODUCTION; export NODE_OPTIONS='--max-old-space-size=4096'; npm run build",
]

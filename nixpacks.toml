# Nixpacks config for Railway (Node 20+, no npm ci)
# Node version from package.json "engines" (>=20.19.0)

[phases.install]
cmds = ["npm install"]

[phases.build]
# More heap for Angular/Vite build (avoids OOM exit code 3 in CI)
cmds = ["export NODE_OPTIONS='--max-old-space-size=4096' && npm run build"]

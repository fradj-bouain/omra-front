<app-page-header
  [title]="'planningList.title' | translate"
  [subtitle]="'planningList.subtitle' | translate"
  [actionLabel]="'planningList.new' | translate"
  actionLink="/plannings/new"
></app-page-header>

<section class="list-page">
  <mat-card>
    <mat-card-content>
      @if (loading) {
        <p>{{ 'planningList.loading' | translate }}</p>
      } @else {
        <table mat-table [dataSource]="dataSource" class="full-width">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>{{ 'planningList.col.name' | translate }}</th>
            <td mat-cell *matCellDef="let row">{{ row.name }}</td>
          </ng-container>
          <ng-container matColumnDef="itemsPreview">
            <th mat-header-cell *matHeaderCellDef>{{ 'planningList.col.preview' | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <span class="items-preview">{{ itemsPreview(row) }}</span>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row">
              <a mat-icon-button [routerLink]="['/plannings', row.id, 'edit']" [matTooltip]="'planningList.edit' | translate">
                <mat-icon>edit</mat-icon>
              </a>
              <button mat-icon-button (click)="delete(row.id, row.name)" [matTooltip]="'planningList.delete' | translate">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          <tr *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              {{ 'planningList.empty' | translate }}
              <a routerLink="/plannings/new">{{ 'planningList.emptyLink' | translate }}</a>.
            </td>
          </tr>
        </table>
      }
    </mat-card-content>
  </mat-card>
</section>

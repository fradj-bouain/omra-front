<app-page-header
  title="Agences"
  subtitle="Liste des agences et de leur statut"
  actionLabel="Nouvelle agence"
  actionLink="/agencies/new"
></app-page-header>

<section class="agency-list-page">
  <mat-card class="list-card">
    <div class="list-toolbar">
      <span class="list-count">{{ totalElements }} agence{{ totalElements !== 1 ? 's' : '' }}</span>
    </div>

    <div class="table-wrap">
      <table mat-table [dataSource]="dataSource" class="agency-table full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nom</th>
          <td mat-cell *matCellDef="let row">
            <span class="cell-name">{{ row.name }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let row">{{ row.email }}</td>
        </ng-container>
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef>Ville</th>
          <td mat-cell *matCellDef="let row">{{ row.city || '—' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Statut</th>
          <td mat-cell *matCellDef="let row">
            <span
              class="status-badge"
              [class.status-badge--active]="row.status === 'ACTIVE'"
              [class.status-badge--suspended]="row.status === 'SUSPENDED'"
              [class.status-badge--expired]="row.status === 'EXPIRED'"
              [class.status-badge--muted]="!row.status"
            >
              {{ getStatusLabel(row.status) }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <a mat-icon-button [routerLink]="['/agencies', 'edit', row.id]" matTooltip="Modifier" class="btn-edit" aria-label="Modifier">
              <mat-icon>edit</mat-icon>
            </a>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        <tr class="mat-row no-data-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            @if (loading) {
              <div class="empty-state">
                <div class="empty-state__spinner"></div>
                <p>Chargement des agences…</p>
              </div>
            } @else {
              <div class="empty-state">
                <mat-icon class="empty-state__icon">business</mat-icon>
                <p class="empty-state__title">Aucune agence</p>
                <p class="empty-state__desc">Créez une agence pour commencer.</p>
              </div>
            }
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="size"
      [pageIndex]="page - 1"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
      class="list-paginator"
    ></mat-paginator>
  </mat-card>
</section>

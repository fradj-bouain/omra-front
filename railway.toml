# Railway deploy: multi-stage Dockerfile (Node 22) — avoids Nixpacks nix-env / GitHub nixpkgs fetch failures.
# Set "Root Directory" to this folder (omra-front) if the Git repo root is the monorepo parent.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
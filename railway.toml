# Railway deploy: Node serves the built Angular app (no Docker, no Nginx)
# Set "Root Directory" to omra-front in Railway dashboard if repo root is parent.

[build]
builder = "nixpacks"
buildCommand = "unset NPM_CONFIG_PRODUCTION; export NODE_OPTIONS='--max-old-space-size=4096'; npm run build"

[deploy]
startCommand = "node server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
